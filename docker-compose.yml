services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://portfolio:portfolio@postgres:5432/portfolio?sslmode=disable
      MIGRATIONS_DIR: /app/migrations
      PORT: 8080
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      JWT_SECRET: supersecretkey
      STORAGE_DIR: /app/storage
    ports:
      - "8080:8080"
    volumes:
      - storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./frontend
    environment:
      API_TARGET: http://backend:8080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  pgdata:
  storage:
